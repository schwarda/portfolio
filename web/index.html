<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">
  <script
    src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit"
    defer
  ></script>

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="about_me_portfolio">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>about_me_portfolio</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    window.portfolioTurnstile = {
      render: function (containerId, siteKey) {
        if (!siteKey || !window.turnstile) {
          return false;
        }

        var container = document.getElementById(containerId);
        if (!container) {
          return false;
        }

        if (container.dataset.widgetId) {
          try {
            window.turnstile.remove(container.dataset.widgetId);
          } catch (_) {}
        }

        container.innerHTML = '';
        container.dataset.token = '';

        var widgetId = window.turnstile.render('#' + containerId, {
          sitekey: siteKey,
          theme: 'dark',
          size: 'flexible',
          callback: function (token) {
            container.dataset.token = token;
            window.dispatchEvent(
              new CustomEvent('portfolio-turnstile-token', {
                detail: { containerId: containerId, token: token }
              })
            );
          },
          'expired-callback': function () {
            container.dataset.token = '';
            window.dispatchEvent(
              new CustomEvent('portfolio-turnstile-expired', {
                detail: { containerId: containerId }
              })
            );
          },
          'error-callback': function () {
            container.dataset.token = '';
            window.dispatchEvent(
              new CustomEvent('portfolio-turnstile-error', {
                detail: { containerId: containerId }
              })
            );
          }
        });

        container.dataset.widgetId = widgetId;
        return true;
      },
      reset: function (containerId) {
        var container = document.getElementById(containerId);
        if (!container || !container.dataset.widgetId || !window.turnstile) {
          return;
        }

        container.dataset.token = '';
        window.turnstile.reset(container.dataset.widgetId);
      },
      getToken: function (containerId) {
        var container = document.getElementById(containerId);
        if (!container) {
          return '';
        }

        return container.dataset.token || '';
      }
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
