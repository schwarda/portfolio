<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta
    name="description"
    content="Portfolio of Dávid Schwartz, frontend developer focused on web, mobile, UX, and performance."
  >
  <meta name="theme-color" content="#08111A">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Dávid Schwartz Portfolio">
  <meta
    property="og:description"
    content="Frontend portfolio focused on web, mobile, UX, and performance."
  >
  <meta property="og:image" content="share-card.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Dávid Schwartz Portfolio">
  <meta
    name="twitter:description"
    content="Frontend portfolio focused on web, mobile, UX, and performance."
  >
  <meta name="twitter:image" content="share-card.png">
  <script
    src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit"
    defer
  ></script>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: #08111A;
      overscroll-behavior: none;
    }

    body {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    flutter-view,
    flt-glass-pane {
      display: block;
      width: 100%;
      height: 100%;
      background: transparent;
    }
  </style>

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dávid Schwartz Portfolio">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Dávid Schwartz Portfolio</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    window.portfolioTurnstile = {
      copyFor: function (localeCode) {
        var isSlovak = String(localeCode || '').toLowerCase().indexOf('sk') === 0;
        if (isSlovak) {
          return {
            title: 'Bezpečnostné overenie',
            text: 'Dokončite overenie a potom odošlite správu.',
            close: 'Zavrieť'
          };
        }
        return {
          title: 'Security verification',
          text: 'Complete the verification and then send your message.',
          close: 'Close'
        };
      },
      updateCopy: function (localeCode) {
        var copy = window.portfolioTurnstile.copyFor(localeCode);
        var title = document.getElementById('portfolio-turnstile-title');
        var text = document.getElementById('portfolio-turnstile-text');
        var close = document.getElementById('portfolio-turnstile-close');
        if (title) title.textContent = copy.title;
        if (text) text.textContent = copy.text;
        if (close) close.textContent = copy.close;
      },
      ensureModal: function (localeCode) {
        if (document.getElementById('portfolio-turnstile-overlay')) {
          window.portfolioTurnstile.updateCopy(localeCode);
          return;
        }

        var overlay = document.createElement('div');
        overlay.id = 'portfolio-turnstile-overlay';
        overlay.style.position = 'fixed';
        overlay.style.inset = '0';
        overlay.style.display = 'none';
        overlay.style.alignItems = 'center';
        overlay.style.justifyContent = 'center';
        overlay.style.background = 'rgba(5, 11, 20, 0.72)';
        overlay.style.backdropFilter = 'blur(8px)';
        overlay.style.zIndex = '2147483647';
        overlay.style.padding = '16px';

        var card = document.createElement('div');
        card.style.width = 'min(420px, 100%)';
        card.style.background = '#101825';
        card.style.border = '1px solid rgba(113, 146, 179, 0.35)';
        card.style.borderRadius = '18px';
        card.style.padding = '16px';
        card.style.boxShadow = '0 24px 60px rgba(0, 0, 0, 0.42)';

        var title = document.createElement('div');
        title.id = 'portfolio-turnstile-title';
        title.style.color = '#f3f7fb';
        title.style.fontFamily = 'sans-serif';
        title.style.fontWeight = '700';
        title.style.fontSize = '18px';
        title.style.marginBottom = '8px';

        var text = document.createElement('div');
        text.id = 'portfolio-turnstile-text';
        text.style.color = 'rgba(243, 247, 251, 0.72)';
        text.style.fontFamily = 'sans-serif';
        text.style.fontSize = '14px';
        text.style.marginBottom = '14px';

        var slot = document.createElement('div');
        slot.id = 'portfolio-turnstile-slot';
        slot.style.minHeight = '70px';

        var close = document.createElement('button');
        close.type = 'button';
        close.id = 'portfolio-turnstile-close';
        close.style.marginTop = '14px';
        close.style.padding = '10px 14px';
        close.style.borderRadius = '10px';
        close.style.border = '1px solid rgba(113, 146, 179, 0.35)';
        close.style.background = '#152131';
        close.style.color = '#f3f7fb';
        close.style.cursor = 'pointer';
        close.onclick = function () {
          overlay.style.display = 'none';
        };

        card.appendChild(title);
        card.appendChild(text);
        card.appendChild(slot);
        card.appendChild(close);
        overlay.appendChild(card);
        document.body.appendChild(overlay);
        window.portfolioTurnstile.updateCopy(localeCode);
      },
      open: function (containerId, siteKey, localeCode) {
        if (!siteKey || !window.turnstile) {
          return false;
        }

        window.portfolioTurnstile.ensureModal(localeCode);
        var overlay = document.getElementById('portfolio-turnstile-overlay');
        var slot = document.getElementById('portfolio-turnstile-slot');
        if (!overlay || !slot) return false;

        overlay.style.display = 'flex';
        slot.innerHTML = '';

        var container = document.createElement('div');
        container.id = containerId;
        container.dataset.token = '';
        slot.appendChild(container);

        if (container.dataset.widgetId) {
          try {
            window.turnstile.remove(container.dataset.widgetId);
          } catch (_) {}
        }

        var widgetId = window.turnstile.render('#' + containerId, {
          sitekey: siteKey,
          theme: 'dark',
          size: 'flexible',
          callback: function (token) {
            container.dataset.token = token;
            overlay.style.display = 'none';
            window.dispatchEvent(
              new CustomEvent('portfolio-turnstile-token', {
                detail: { containerId: containerId, token: token }
              })
            );
          },
          'expired-callback': function () {
            container.dataset.token = '';
            window.dispatchEvent(
              new CustomEvent('portfolio-turnstile-expired', {
                detail: { containerId: containerId }
              })
            );
          },
          'error-callback': function () {
            container.dataset.token = '';
            window.dispatchEvent(
              new CustomEvent('portfolio-turnstile-error', {
                detail: { containerId: containerId }
              })
            );
          }
        });

        container.dataset.widgetId = widgetId;
        return true;
      },
      reset: function (containerId) {
        var container = document.getElementById(containerId);
        if (!container || !container.dataset.widgetId || !window.turnstile) {
          return;
        }

        container.dataset.token = '';
        window.turnstile.reset(container.dataset.widgetId);
      },
      getToken: function (containerId) {
        var container = document.getElementById(containerId);
        if (!container) {
          return '';
        }

        return container.dataset.token || '';
      },
      close: function () {
        var overlay = document.getElementById('portfolio-turnstile-overlay');
        if (overlay) {
          overlay.style.display = 'none';
        }
      }
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
